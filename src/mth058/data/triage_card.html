<div class="triage-card {{ severity_class }}">
    <div class="triage-card-header">
        <div class="triage-header-item">
            <div class="triage-label">SEVERITY</div>
            <span class="triage-badge badge-severity">{{ severity }}</span>
        </div>
        <div class="triage-header-item">
            <div class="triage-label">PRIVACY STATUS</div>
            <span class="triage-badge {{ 'badge-safety-safe' if is_safe else 'badge-safety-unsafe' }}">
                {{ 'PII SAFE' if is_safe else 'PII LEAK' }}
            </span>
        </div>
        <div class="triage-header-item">
            <div class="triage-label">ASSIGNED TEAM</div>
            <span class="triage-badge badge-team">{{ team }}</span>
        </div>
    </div>

    <div class="triage-card-impact">
        <div class="triage-label" style="margin-bottom: 4px;">IMPACT SUMMARY</div>
        <div style="color: #1f2937; line-height: 1.4;">{{ impact }}</div>
    </div>

    <div class="triage-legend">
        <div class="legend-title">Triage Legend</div>
        <div class="legend-grid">
            <div class="legend-item"><div class="legend-dot" style="background-color: #ef4444;"></div> Sev-1 (Critical)</div>
            <div class="legend-item"><div class="legend-dot" style="background-color: #f97316;"></div> Sev-2 (High)</div>
            <div class="legend-item"><div class="legend-dot" style="background-color: #f59e0b;"></div> Sev-3 (Medium)</div>
            <div class="legend-item"><div class="legend-dot" style="background-color: #3b82f6;"></div> Sev-4 (Low)</div>
            <div class="legend-item"><div class="legend-dot" style="background-color: #dcfce7;"></div> PII Safe</div>
            <div class="legend-item"><div class="legend-dot" style="background-color: #fee2e2;"></div> PII Leak</div>
        </div>
    </div>
</div>
