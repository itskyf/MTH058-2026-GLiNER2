<div class="triage-card {{ severity_class }}">
    <div class="triage-card-header">
        <div class="triage-header-item">
            <div class="triage-label">SEVERITY</div>
            <span class="triage-badge badge-severity">{{ severity }}</span>
        </div>
        <div class="triage-header-item">
            <div class="triage-label">PRIVACY STATUS</div>
            <span class="triage-badge {{ 'badge-safety-safe' if is_safe else 'badge-safety-unsafe' }}">
                {{ 'PII SAFE' if is_safe else 'PII LEAK' }}
            </span>
        </div>
        <div class="triage-header-item">
            <div class="triage-label">ASSIGNED TEAM</div>
            <span class="triage-badge badge-team">{{ team }}</span>
        </div>
    </div>

    <div class="triage-card-impact">
        <div class="triage-label" style="margin-bottom: 4px;">IMPACT SUMMARY</div>
        <div style="color: #1f2937; line-height: 1.4;">{{ impact }}</div>
    </div>
</div>
